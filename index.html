<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>mensura</title>
  <style>
    :root{
      --bg: #ffffff;
      --text: #111111;
      --muted: #444444;
      --link: #0b57d0;
      --rule: #dddddd;
      --focus: #ffbf47;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg: #0f1115;
        --text: #e8e8e8;
        --muted: #b7b7b7;
        --link: #9ecbff;
        --rule: #2a2f3a;
        --focus: #ffd24d;
      }
    }
    html { font-size: 18px; }
    body{
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }
    a{ color: var(--link); }
    a:focus, a:focus-visible{
      outline: 3px solid var(--focus);
      outline-offset: 3px;
      border-radius: 4px;
    }
    .wrap{
      max-width: 42rem;
      margin: 0 auto;
      padding: 4rem 1rem 3rem;
    }
    .skip{
      position: absolute;
      left: -999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .skip:focus{
      left: 1rem;
      top: 1rem;
      width: auto;
      height: auto;
      padding: .5rem .75rem;
      background: var(--bg);
      border: 1px solid var(--rule);
      z-index: 10;
    }
    h1{
      margin: 0 0 1rem 0;
      font-weight: 650;
      letter-spacing: 0.02em;
    }
    p{ margin: 0 0 1rem 0; color: var(--muted); }
    nav ul{
      list-style: none;
      padding: 0;
      margin: 2rem 0 0 0;
    }
    nav li{ margin: .75rem 0; }
    hr{
      margin: 2.5rem 0;
      border: none;
      border-top: 1px solid var(--rule);
    }
    .note{
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 36rem;
    }
    /* artwork */
.art-desktop {
  position: relative;
}

.bee-desktop {
  position: absolute;
  top: -20px;
  left: -20px;
  width: 90px;
  height: auto;
  opacity: 0.95;
}

.snail-desktop {
  position: absolute;
  bottom: -10px;
  right: -20px;
  width: 90px;
  height: auto;
  opacity: 0.95;
}

.mobile-bee,
.mobile-snail {
  display: none;
}

@media (max-width: 600px) {
  .art-desktop {
    display: none;
  }

  .mobile-bee,
  .mobile-snail {
    display: block;
  }

  .mobile-bee {
    text-align: right;
    margin: 1rem 0 1.5rem 0;
  }

  .mobile-snail {
    text-align: center;
    margin: 2rem 0 0 0;
  }

  .mobile-bee img,
  .mobile-snail img {
    width: 90px;
    height: auto;
  }
}
  </style>
</head>

<body>
  <a class="skip" href="#content">Skip to content</a>

  <div class="wrap">
    <header>
      <h1>mensura</h1>
      <p>Quiet structure. Public artifacts below.</p>
    </header>

    <main id="content">
      
<div class="art-desktop">
  <img src="./mensura-bee.jpg" alt="Bee visiting a flower" class="bee-desktop">
  <img src="./mensura-snail.jpg" alt="Snail moving along moss" class="snail-desktop">
</div>
      
      <nav aria-label="Public artifacts">
        <ul>
          <li><a href="./paper.pdf">Paper (PDF)</a></li>
          <li><a href="./clm.pdf">CLM</a></li>
          <li>
            <a href="https://within-v1-3.vercel.app/" target=_blank" rel="noopener">
              within - stacked runs pilot
            </a><br>
            <span style="font-size:0.9rem;color:#888;">
              Declare movement. Neighbors coordinate.
            </span>
          </li>
          <li><a href="./accessibility.html">Accessibility</a></li>
        </ul>
      </nav>
      <div class="art-desktop">
  <img src="./mensura-bee.jpg" alt="Bee visiting a flower" class="bee-desktop">
  <img src="./mensura-snail.jpg" alt="Snail moving along moss" class="snail-desktop">
</div>

      <hr />

      <div class="mobile-snail">
  <img src="./mensura-snail.jpg" alt="Snail moving along moss">
</div>

    </main>
  </div>
</body>
</html>
